<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #0e0c0a;
      font-family: Georgia, serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="background-color: #0e0c0a; padding: 48px 0"
    >
      <tr>
        <td align="center">
          <table
            width="520"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              background-color: #15120f;
              border-radius: 4px;
              border: 1px solid #2a2420;
            "
          >
            <!-- Header / Logo -->
            <tr>
              <td align="center" style="padding: 40px 40px 24px">
                <div
                  style="
                    font-size: 13px;
                    letter-spacing: 6px;
                    color: #c9a35e;
                    text-transform: uppercase;
                    font-weight: bold;
                  "
                >
                  NOCTEON
                </div>
                <div
                  style="
                    font-size: 9px;
                    letter-spacing: 3px;
                    color: #7a7165;
                    text-transform: uppercase;
                    margin-top: 4px;
                  "
                >
                  Coffee
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 60px">
                <div style="height: 1px; background-color: #2a2420"></div>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td style="padding: 40px 48px">
                <p
                  style="
                    font-size: 11px;
                    letter-spacing: 2px;
                    color: #c9a35e;
                    text-transform: uppercase;
                    margin: 0 0 12px;
                    text-align: center;
                  "
                >
                  Reset Your Password
                </p>

                <h1
                  style="
                    font-size: 22px;
                    color: #f0ebe2;
                    margin: 0 0 8px;
                    text-align: center;
                    font-weight: normal;
                  "
                >
                  Your Reset Code
                </h1>

                <p
                  style="
                    font-size: 14px;
                    color: #9a9186;
                    margin: 0 0 32px;
                    text-align: center;
                    line-height: 1.6;
                  "
                >
                  Use this code to reset your NOCTEON Coffee password.
                </p>

                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center">
                      <div
                        style="
                          display: inline-block;
                          background-color: #0e0c0a;
                          border: 1px solid #c9a35e;
                          border-radius: 4px;
                          padding: 18px 32px;
                        "
                      >
                        <span
                          style="
                            font-size: 32px;
                            font-weight: bold;
                            letter-spacing: 10px;
                            color: #c9a35e;
                          "
                          th:text="${otp}"
                          >123456</span
                        >
                      </div>
                    </td>
                  </tr>
                </table>

                <p
                  style="
                    font-size: 12px;
                    color: #5c5650;
                    margin: 32px 0 0;
                    text-align: center;
                    line-height: 1.6;
                  "
                >
                  This code expires in 10 minutes.<br />
                  If you didn't request this, you can safely ignore this email.
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 0 60px">
                <div style="height: 1px; background-color: #2a2420"></div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 24px 40px 36px">
                <p style="font-size: 11px; color: #5c5650; margin: 0">
                  © 2026 NOCTEON Coffee — Crafted with intention.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
